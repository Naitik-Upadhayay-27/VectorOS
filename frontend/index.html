<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon — versioned to bust cache -->
    <link rel="icon" type="image/png" href="/logo_fav.png?v=2" />
    <link rel="shortcut icon" href="/logo_fav.png?v=2" />
    <link rel="apple-touch-icon" href="/logo_fav.png?v=2" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#7c3aed" />

    <!-- Canonical -->
    <link rel="canonical" href="https://skillvector.in/" />

    <!-- Primary Meta Tags -->
    <title>
      Skill Vector — AI Resume Builder, ATS Score & Job Search for India
    </title>
    <meta
      name="title"
      content="Skill Vector — AI Resume Builder, ATS Score & Job Search for India"
    />
    <meta
      name="description"
      content="Build ATS-optimized resumes with AI, get instant ATS scores, tailor your resume to any job description, and find jobs on LinkedIn & Indeed — all in one platform. Free to start."
    />
    <meta
      name="keywords"
      content="AI resume builder India, ATS score checker, resume optimizer, free resume builder, job search India, cover letter generator AI, resume ATS checker, resume tailor job description, career coach AI, resume builder for freshers, resume builder for experienced, LinkedIn job search, Indeed jobs India, resume templates India, skill vector"
    />
    <meta name="author" content="Skill Vector" />
    <meta
      name="robots"
      content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1"
    />
    <meta name="googlebot" content="index, follow" />

    <!-- Open Graph / Facebook / LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://skillvector.in/" />
    <meta property="og:site_name" content="Skill Vector" />
    <meta
      property="og:title"
      content="Skill Vector — AI Resume Builder & ATS Score Checker"
    />
    <meta
      property="og:description"
      content="Build ATS-optimized resumes with AI, get instant ATS scores, tailor your resume to any job, and find jobs — all free to start. Used by job seekers across India."
    />
    <meta property="og:image" content="https://skillvector.in/logo.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://skillvector.in/" />
    <meta
      name="twitter:title"
      content="Skill Vector — AI Resume Builder & ATS Score Checker"
    />
    <meta
      name="twitter:description"
      content="Build ATS-optimized resumes with AI, get instant ATS scores, tailor your resume to any job, and find jobs — all free to start."
    />
    <meta name="twitter:image" content="https://skillvector.in/logo.png" />
    <meta name="twitter:site" content="@skillvector" />

    <!-- Structured Data — SoftwareApplication -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Skill Vector",
        "url": "https://skillvector.in",
        "description": "AI-powered resume builder, ATS score checker, and job search platform for India.",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Web",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "INR"
        },
        "aggregateRating": {
          "@type": "AggregateRating",
          "ratingValue": "4.8",
          "ratingCount": "120"
        }
      }
    </script>

    <!-- Structured Data — Organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Skill Vector",
        "url": "https://skillvector.in",
        "logo": "https://skillvector.in/logo.png",
        "contactPoint": {
          "@type": "ContactPoint",
          "email": "raushan.singh@skillvector.in",
          "contactType": "customer support"
        }
      }
    </script>

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:wght@400;700&family=Lato:wght@400;700&family=Roboto:wght@400;500;700&family=Open+Sans:wght@400;600;700&family=Playfair+Display:wght@400;700&family=Source+Sans+3:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
